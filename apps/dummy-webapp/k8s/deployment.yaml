apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-webapp
  namespace: apps
  labels:
    app: dummy-webapp
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy-webapp
  template:
    metadata:
      labels:
        app: dummy-webapp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: webapp
          image: dummy-webapp:latest
          imagePullPolicy: Never  # image built directly inside minikube docker
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: dummy-webapp-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi  # intentionally low — OOM scenario raises this to 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
