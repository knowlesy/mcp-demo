apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dummy-webapp
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.1/32"
    # ↑ Chaos Scenario 3 ADDS this annotation to simulate an IP block.
    #   The Ansible fix playbook removes it to restore access.
spec:
  ingressClassName: nginx
  rules:
    - host: app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dummy-webapp
                port:
                  number: 80
