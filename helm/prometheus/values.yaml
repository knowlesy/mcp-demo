# kube-prometheus-stack — low-resource local configuration
# Helm chart: prometheus-community/kube-prometheus-stack

fullnameOverride: kube-prometheus-stack

# ── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminUser: admin
  adminPassword: password
  replicas: 1

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.local

  persistence:
    enabled: false

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  sidecar:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # Pre-load useful dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: browser

  grafana.ini:
    auth:
      disable_login_form: false
    auth.anonymous:
      enabled: false
    server:
      root_url: http://grafana.local

# ── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 6h
    retentionSize: "2GB"

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    storageSpec:
      emptyDir:
        medium: ""

    # Scrape the dummy-webapp namespace
    additionalScrapeConfigs:
      - job_name: dummy-webapp
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [apps]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

# ── AlertManager ─────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    storage:
      emptyDir:
        medium: ""

# ── Operators / Exporters ─────────────────────────────────────────────────────
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Disable components not needed for local testing
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
